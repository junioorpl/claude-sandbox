# docker-compose.yml — claude-sandbox
# Launched via bin/claude-sandbox <org> [service]. ORG is required.

name: claude-sandbox

# ---------------------------------------------------------------------------
# Mount anchors. YAML scalar anchors let us define each mount string once
# and reference it by alias in every service that needs it. Compose's list
# merge semantics don't splat a list anchor into a parent list, but scalar
# aliases work: a change to the path happens in one place.
# Named-volume mounts come FIRST in each service (so host bind-mounts can
# shadow subpaths without being overridden by the named volume).
# ---------------------------------------------------------------------------
x-m-claude-data:   &m-claude-data   "claude-data:/home/node/.claude"
x-m-cli-bin:       &m-cli-bin       "claude-cli-bin:/opt/claude-cli"
x-m-workspace:     &m-workspace     "workspace:/workspace"
x-m-workspace-agent: &m-workspace-agent "workspace-agent:/workspace"
x-m-plugins:       &m-plugins       "${HOME}/.claude/plugins:/home/node/.claude/plugins"
x-m-skills:        &m-skills        "${HOME}/.claude/skills:/home/node/.claude/skills"
x-m-settings:      &m-settings      "${HOME}/.claude/settings.json:/home/node/.claude/settings.json:ro"
x-m-claude-md:     &m-claude-md     "${HOME}/.claude/CLAUDE.md:/home/node/.claude/CLAUDE.md:ro"
# Brain vault mount — opt-in. Set BRAIN_PATH in orgs/<org>/.env to mount an
# external knowledge directory (e.g., Obsidian vault) at /brain. When unset,
# launcher substitutes an empty scratch dir so this mount always resolves.
x-m-brain:         &m-brain         "${BRAIN_PATH:?BRAIN_PATH must be set — launcher sets a default if not provided in .env}:/brain"
x-m-ssh:           &m-ssh           "${HOME}/.ssh:/home/node/.ssh:ro"

x-base-service: &base-service
  # Override via IMAGE env (set in orgs/<org>/.env or shell) to pull from a fork's GHCR.
  image: ${IMAGE:-ghcr.io/junioorpl/claude-sandbox:latest}
  build:
    context: .devcontainer
    dockerfile: Dockerfile
    args:
      NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm}
  cap_add:
    - NET_ADMIN
    - NET_RAW
  tty: true
  stdin_open: true
  working_dir: /workspace
  user: node
  healthcheck:
    test: ["CMD-SHELL", "test -x /opt/claude-cli/bin/claude"]
    interval: 30s
    timeout: 3s
    retries: 3
    start_period: 90s
  environment:
    NODE_OPTIONS: --max-old-space-size=4096
    CLAUDE_CONFIG_DIR: /home/node/.claude
    POWERLEVEL9K_DISABLE_GITSTATUS: "true"
    FIREWALL: ${FIREWALL:-on}
    FIREWALL_REFRESH_INTERVAL: ${FIREWALL_REFRESH_INTERVAL:-900}
    IPV6: ${IPV6:-deny}
    EXTRA_ALLOWED_DOMAINS: ${EXTRA_ALLOWED_DOMAINS:-}
    GH_TOKEN: ${GH_TOKEN:-}
    GIT_USER_NAME: ${GIT_USER_NAME:-}
    GIT_USER_EMAIL: ${GIT_USER_EMAIL:-}
    REPOS: ${REPOS:-}
    ORG: ${ORG:?ORG must be set — use bin/claude-sandbox <org>}
  entrypoint: ["/bin/bash", "-c"]
  command:
    - |
      sudo --preserve-env=FIREWALL,FIREWALL_REFRESH_INTERVAL,IPV6,EXTRA_ALLOWED_DOMAINS,GH_TOKEN /usr/local/bin/init-firewall-wrapper.sh
      if [ -n "$$GIT_USER_NAME" ]; then git config --global user.name "$$GIT_USER_NAME"; fi
      if [ -n "$$GIT_USER_EMAIL" ]; then git config --global user.email "$$GIT_USER_EMAIL"; fi
      if [ -n "$$REPOS" ]; then
        # Accept either newline- or space-delimited REPOS for backwards compat.
        # Use process substitution so `exit 1` inside the loop propagates up.
        while IFS= read -r url; do
          [ -z "$$url" ] && continue
          name=$$(basename -s .git "$$url")
          if [ ! -d "/workspace/$$name" ]; then
            echo "[bootstrap] cloning $$url"
            if ! git clone "$$url" "/workspace/$$name"; then
              echo "[bootstrap] ERROR failed to clone $$url" >&2
              exit 1
            fi
          fi
        done < <(printf '%s\n' "$$REPOS" | tr ' ' '\n')
      fi
      exec zsh

services:
  # NOTE: volume order matters. Per-org claude-data volume mounts FIRST at
  # /home/node/.claude, then host bind-mounts shadow specific subpaths.
  dev:
    <<: *base-service
    volumes:
      - *m-claude-data
      - *m-cli-bin
      - *m-workspace
      - *m-plugins
      - *m-skills
      - *m-settings
      - *m-claude-md
      - *m-brain
      - *m-ssh

  throwaway:
    <<: *base-service
    volumes:
      - *m-claude-data
      - *m-cli-bin
      # No named workspace volume — anonymous, discarded with --rm
      - *m-plugins
      - *m-skills
      - *m-settings
      - *m-claude-md
      - *m-brain
      - *m-ssh

  agent:
    <<: *base-service
    profiles: [agent]
    volumes:
      - *m-claude-data
      - *m-cli-bin
      - *m-workspace-agent
      - *m-plugins
      - *m-skills
      - *m-settings
      - *m-claude-md
      - *m-brain
      - *m-ssh

  # Hermetic variant of dev — no host bind-mounts.
  dev-hermetic:
    <<: *base-service
    volumes:
      - *m-claude-data
      - *m-cli-bin
      - *m-workspace

  # One-shot CLI installer/upgrader for the shared volume.
  # Invoked by launcher: docker compose run --rm cli-init
  # Runs as root so it can write to a fresh (root-owned) named volume, then
  # chowns everything to uid 1000 (node user) for the dev containers.
  cli-init:
    image: ${NODE_IMAGE:-node:20-bookworm}
    user: "0:0"
    volumes:
      - *m-cli-bin
    environment:
      CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-latest}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "Installing @anthropic-ai/claude-code@$$CLAUDE_CLI_VERSION to /opt/claude-cli"
        mkdir -p /opt/claude-cli
        npm install -g --prefix /opt/claude-cli "@anthropic-ai/claude-code@$$CLAUDE_CLI_VERSION"
        chown -R 1000:1000 /opt/claude-cli
        /opt/claude-cli/bin/claude --version

volumes:
  claude-cli-bin:
  # Per-org volumes: the local compose key is static, but the actual Docker
  # volume name interpolates $ORG (and $AGENT_NAME for the agent variant).
  # Isolation guarantee: a container started with ORG=acme mounts
  # claude-data-acme / workspace-acme — there is no code path that lets it
  # reach claude-data-personal.
  claude-data:
    name: claude-data-${ORG}
  workspace:
    name: workspace-${ORG}
  workspace-agent:
    name: workspace-${ORG}-${AGENT_NAME:-_unused}

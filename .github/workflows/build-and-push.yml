name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - '.github/workflows/build-and-push.yml'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: version
        run: |
          if [ -f VERSION ]; then
            raw="$(tr -d '[:space:]' < VERSION)"
          else
            raw="0.0.0"
          fi
          echo "full=$raw" >> "$GITHUB_OUTPUT"
          echo "major=${raw%%.*}" >> "$GITHUB_OUTPUT"
          minor="${raw%.*}"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-sandbox:latest
            ghcr.io/${{ github.repository_owner }}/claude-sandbox:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/claude-sandbox:v${{ steps.version.outputs.full }}
            ghcr.io/${{ github.repository_owner }}/claude-sandbox:v${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository_owner }}/claude-sandbox:v${{ steps.version.outputs.major }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.full }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

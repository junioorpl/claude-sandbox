version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
    commit-message:
      prefix: "build(deps)"
    labels:
      - dependencies
      - docker
